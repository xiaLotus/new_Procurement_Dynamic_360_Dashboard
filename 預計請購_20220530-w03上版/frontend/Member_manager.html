<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>成員管理系統</title>
  <script src="../static/js/vue.global.js"></script>
  <link href="../static/css/tailwind.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      color: #1e293b;
      background: linear-gradient(135deg, #f0f4ff 0%, #f8fafc 60%, #f0fdf4 100%);
    }

    /* ── 版面 ── */
    .page-wrap { max-width: 760px; margin: 0 auto; padding: 44px 20px; display: flex; flex-direction: column; gap: 28px; }

    /* ── 頁首 ── */
    .page-header { display: flex; align-items: flex-start; justify-content: space-between; }
    .page-badge {
      display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: #6366f1; background: #eef2ff;
      border: 1px solid #c7d2fe; border-radius: 999px; padding: 3px 10px; margin-bottom: 8px;
    }
    .page-title { font-size: 26px; font-weight: 800; color: #0f172a; letter-spacing: -.02em; }
    .page-sub   { font-size: 13px; color: #94a3b8; margin-top: 3px; }

    /* ── 卡片 ── */
    .card {
      background: white;
      border-radius: 20px;
      border: 1px solid #e8edf5;
      box-shadow: 0 2px 8px rgba(0,0,0,.04), 0 12px 32px rgba(99,102,241,.04);
      overflow: hidden;
    }
    .card-header {
      display: flex; align-items: center; gap: 14px;
      padding: 18px 24px;
      background: linear-gradient(to right, #fafbff, #ffffff);
      border-bottom: 1px solid #f1f5f9;
    }
    .card-icon {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
      background: linear-gradient(135deg,#dbeafe,#ede9fe);
    }
    .card-title { font-size: 15px; font-weight: 700; color: #0f172a; }
    .card-sub   { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    .card-header-right { margin-left: auto; }
    .card-body  { padding: 22px 24px; display: flex; flex-direction: column; gap: 18px; }

    /* ── 按鈕 ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 20px; border-radius: 10px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; border: none;
      transition: all .15s; letter-spacing: .01em;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      box-shadow: 0 2px 8px rgba(99,102,241,.3);
    }
    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      box-shadow: 0 4px 14px rgba(99,102,241,.4);
    }
    .btn-secondary {
      background: white; color: #475569;
      border: 1px solid #e2e8f0;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .btn-secondary:hover { background: #f8fafc; border-color: #cbd5e1; }
    .btn-danger { background: linear-gradient(135deg,#f87171,#ef4444); color: white; box-shadow: 0 2px 8px rgba(239,68,68,.25); }
    .btn-danger:hover:not(:disabled) { background: linear-gradient(135deg,#ef4444,#dc2626); }
    .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 8px; }

    /* ── 輸入 ── */
    .field-label {
      display: block; font-size: 11px; font-weight: 700;
      color: #64748b; letter-spacing: .07em; text-transform: uppercase; margin-bottom: 6px;
    }
    .req { color: #f87171; }
    input.input {
      width: 100%; border: 1.5px solid #e8edf5; border-radius: 10px;
      padding: 9px 13px; font-size: 14px; background: #fafbff;
      outline: none; transition: all .15s; font-family: inherit; color: #1e293b;
    }
    input.input:focus {
      border-color: #818cf8; box-shadow: 0 0 0 3px rgba(129,140,248,.15); background: white;
    }
    input.input.err   { border-color: #f87171; box-shadow: 0 0 0 3px rgba(248,113,113,.12); }
    .err-msg { font-size: 12px; color: #ef4444; margin-top: 5px; display: flex; align-items: center; gap: 4px; }
    .input-disabled {
      background: #f8fafc; color: #94a3b8;
      border: 1.5px solid #e8edf5; border-radius: 10px;
      padding: 9px 13px; font-size: 14px;
    }

    /* ── Chip ── */
    .chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg,#eff6ff,#f5f3ff);
      border: 1px solid #c7d2fe; color: #4338ca;
      border-radius: 999px; padding: 5px 13px 5px 11px;
      font-size: 13px; font-weight: 500;
      transition: all .15s;
    }
    .chip:hover { border-color: #818cf8; background: #eef2ff; }
    .chip-del {
      width: 16px; height: 16px; border-radius: 50%;
      background: #c7d2fe;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 800; color: #4338ca;
      cursor: pointer; flex-shrink: 0; transition: all .15s;
    }
    .chip-del:hover { background: #ef4444; color: white; }
    .empty-hint { font-size: 13px; color: #cbd5e1; text-align: center; padding: 24px 0; }

    .divider { border: none; border-top: 1px solid #f1f5f9; }

    .row-flex { display: flex; gap: 10px; align-items: flex-end; }
    .row-flex .field-wrap { flex: 1; }

    /* ── 統計列 ── */
    .stat-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: #f8fafc; border: 1px solid #e2e8f0;
      border-radius: 10px; padding: 8px 14px;
      font-size: 12px; color: #64748b;
    }
    .stat-chip strong { color: #1e293b; font-size: 18px; font-weight: 700; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; right: 28px; z-index: 9999;
      min-width: 230px; max-width: 360px;
      padding: 13px 18px; border-radius: 14px;
      font-size: 13px; font-weight: 500;
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 10px 32px rgba(0,0,0,.12);
      animation: slideUp .22s cubic-bezier(.34,1.56,.64,1);
    }
    .toast-ok  { background: white; border: 1px solid #6ee7b7; color: #065f46; }
    .toast-err { background: white; border: 1px solid #fca5a5; color: #991b1b; }
    @keyframes slideUp { from { opacity:0; transform:translateY(16px) scale(.95); } to { opacity:1; transform:translateY(0) scale(1); } }

    /* ── Modal ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(15,23,42,.5);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
      animation: fadeIn .18s ease;
    }
    .modal {
      background: white; border-radius: 20px;
      padding: 28px 28px 24px;
      width: 100%; max-width: 440px;
      box-shadow: 0 24px 64px rgba(0,0,0,.2);
      animation: popIn .22s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popIn { from { opacity:0; transform:scale(.93) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }

    .modal-title { font-size: 17px; font-weight: 800; color: #0f172a; margin-bottom: 16px; letter-spacing: -.01em; }
    .modal-fields { display: flex; flex-direction: column; gap: 14px; margin-bottom: 22px; }
    .modal-body  { font-size: 13px; color: #64748b; line-height: 1.7; margin-bottom: 22px; }
    .modal-body strong { color: #0f172a; }
    .modal-warn { color: #f87171; font-size: 12px; margin-top: 6px; display: flex; align-items: center; gap: 4px; }
    .modal-hint { font-size: 12px; color: #94a3b8; background: #f8fafc; border-radius: 8px; padding: 8px 12px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding-top: 4px; }

    /* ── 步驟列 ── */
    .step-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
    .step-dot {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; flex-shrink: 0;
      transition: all .3s;
    }
    .step-dot.active   { background: linear-gradient(135deg,#6366f1,#3b82f6); color: white; box-shadow: 0 2px 8px rgba(99,102,241,.4); }
    .step-dot.done     { background: #dcfce7; color: #15803d; }
    .step-dot.inactive { background: #f1f5f9; color: #cbd5e1; }
    .step-line { flex: 1; height: 2px; border-radius: 2px; transition: background .3s; }
    .step-line.active   { background: linear-gradient(to right,#6366f1,#3b82f6); }
    .step-line.inactive { background: #f1f5f9; }

    /* ── 類型選卡 ── */
    .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .type-card {
      border: 2px solid #e8edf5; border-radius: 14px;
      padding: 16px 12px; cursor: pointer; text-align: center;
      font-size: 13px; font-weight: 600; color: #64748b;
      transition: all .2s; background: #fafbff;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
    }
    .type-card:hover { border-color: #a5b4fc; background: #f5f3ff; transform: translateY(-1px); }
    .type-card.green { border-color: #22c55e; background: #f0fdf4; color: #15803d; box-shadow: 0 2px 8px rgba(34,197,94,.12); }
    .type-card.amber { border-color: #f59e0b; background: #fffbeb; color: #92400e; box-shadow: 0 2px 8px rgba(245,158,11,.12); }
    .type-icon  { font-size: 22px; }
    .type-label { font-size: 13px; font-weight: 700; }
    .type-sub   { font-size: 11px; font-weight: 400; opacity: .7; }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media(max-width:480px) { .grid2 { grid-template-columns: 1fr; } }

    .fade-in { animation: fadeIn .2s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
    .tf-enter-active,.tf-leave-active { transition: all .22s ease; }
    .tf-enter-from,.tf-leave-to { opacity:0; transform:translateY(12px); }
  </style>
</head>
<body>

<div id="app">
  <div class="page-wrap">

    <!-- ── 頁首 ── -->
    <div class="page-header">
      <div>
        <div class="page-badge">⚙ Admin</div>
        <div class="page-title">成員管理</div>
        <div class="page-sub">需求者清單維護</div>
      </div>
      <button class="btn btn-secondary" @click="goBack">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
        返回看板
      </button>
    </div>

    <!-- ── 需求者清單卡片 ── -->
    <div class="card">
      <div class="card-header">
        <div class="card-icon">👥</div>
        <div>
          <div class="card-title">需求者清單</div>
          <div class="card-sub">來源：config.cfg</div>
        </div>
        <div class="card-header-right">
          <button class="btn btn-secondary btn-sm" @click="fetchRequesters" :disabled="refreshing">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
            {{ refreshing ? '載入中…' : '重新整理' }}
          </button>
        </div>
      </div>

      <div class="card-body">

        <!-- 統計 -->
        <div>
          <div class="stat-chip">
            <span>共</span>
            <strong>{{ requesters.length }}</strong>
            <span>位需求者</span>
          </div>
        </div>

        <!-- chip 清單 -->
        <div v-if="requesters.length" class="chip-wrap fade-in">
          <span v-for="(name, idx) in requesters" :key="idx" class="chip">
            {{ name }}
            <span class="chip-del" @click="confirmRemove(name)" title="移除">✕</span>
          </span>
        </div>
        <div v-else class="empty-hint">{{ refreshing ? '🔄 載入中…' : '清單目前為空' }}</div>

        <hr class="divider"/>

        <!-- 新增輸入列 -->
        <div class="row-flex">
          <div class="field-wrap">
            <label class="field-label">新增需求者姓名</label>
            <input class="input" :class="{ err: requesterErr }" v-model="newName"
              @keyup.enter="openAddModal" placeholder="輸入姓名後點新增…" />
            <div v-if="requesterErr" class="err-msg">⚠ {{ requesterErr }}</div>
          </div>
          <button class="btn btn-primary" @click="openAddModal" :disabled="cfgLoading" style="white-space:nowrap">
            {{ cfgLoading ? '處理中…' : '＋ 新增' }}
          </button>
        </div>

      </div>
    </div>

  </div><!-- page-wrap -->

  <!-- ── Toast ── -->
  <transition name="tf">
    <div v-if="toast.show" :class="['toast', toast.type==='ok' ? 'toast-ok' : 'toast-err']">
      <span style="font-size:16px;">{{ toast.type==='ok' ? '✅' : '❌' }}</span>
      {{ toast.msg }}
    </div>
  </transition>

  <!-- ══ 新增需求者 Modal（兩步驟）══ -->
  <div v-if="addModal.show" class="overlay" @click.self="cancelAdd">
    <div class="modal">

      <!-- 步驟列 -->
      <div class="step-bar">
        <div class="step-dot" :class="addModal.step===1 ? 'active' : 'done'">
          {{ addModal.step===1 ? '1' : '✓' }}
        </div>
        <div class="step-line" :class="addModal.step===2 ? 'active' : 'inactive'"></div>
        <div class="step-dot" :class="addModal.step===2 ? 'active' : 'inactive'">2</div>
      </div>

      <!-- 步驟 1：選類型 -->
      <template v-if="addModal.step===1">
        <div class="modal-title">新增需求者</div>

        <div style="margin-bottom:16px;">
          <label class="field-label">姓名</label>
          <div class="input-disabled">{{ addModal.name }}</div>
        </div>

        <p style="font-size:13px;color:#64748b;margin-bottom:14px;">
          此人員是否為 <strong style="color:#4338ca;">4000 組員</strong>？
        </p>

        <div class="type-grid">
          <div class="type-card" :class="addModal.memberType==='4000' ? 'green' : ''"
            @click="addModal.memberType='4000'; addModal.step=2; focusPhone()">
            <span class="type-icon">✅</span>
            <span class="type-label">是，4000 組員</span>
            <span class="type-sub">需填寫 Notes_ID</span>
          </div>
          <div class="type-card" :class="addModal.memberType==='other' ? 'amber' : ''"
            @click="addModal.memberType='other'; addModal.step=2; focusPhone()">
            <span class="type-icon">🔹</span>
            <span class="type-label">否，非 4000 組員</span>
            <span class="type-sub">Notes_ID 自動填入</span>
          </div>
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" @click="cancelAdd">取消</button>
        </div>
      </template>

      <!-- 步驟 2：填資料 -->
      <template v-if="addModal.step===2">
        <div class="modal-title" style="display:flex;align-items:center;gap:8px;">
          填寫資料
          <span style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;letter-spacing:.04em;"
            :style="addModal.memberType==='4000'
              ? 'background:#dcfce7;color:#15803d;border:1px solid #86efac'
              : 'background:#fef9c3;color:#854d0e;border:1px solid #fde68a'">
            {{ addModal.memberType==='4000' ? '4000 組員' : '非 4000 組員' }}
          </span>
        </div>

        <div class="modal-fields">
          <div>
            <label class="field-label">姓名</label>
            <div class="input-disabled">{{ addModal.name }}</div>
          </div>

          <div class="grid2">
            <div>
              <label class="field-label">工號 <span class="req">*</span></label>
              <input class="input" :class="{ err: addModal.empErr }"
                v-model="addModal.empId" placeholder="例：K22920" />
              <div v-if="addModal.empErr" class="err-msg">⚠ {{ addModal.empErr }}</div>
            </div>
            <div>
              <label class="field-label">電話分機 <span class="req">*</span></label>
              <input ref="phoneInput" class="input" :class="{ err: addModal.phoneErr }"
                v-model="addModal.phone" @keyup.enter="confirmAdd" placeholder="例：14180" />
              <div v-if="addModal.phoneErr" class="err-msg">⚠ {{ addModal.phoneErr }}</div>
            </div>
          </div>

          <div v-if="addModal.memberType==='4000'">
            <label class="field-label">Notes_ID（Email）<span class="req">*</span></label>
            <input class="input" :class="{ err: addModal.notesErr }"
              v-model="addModal.notesId" @keyup.enter="confirmAdd"
              placeholder="例：JieSyuan_Chiang@aseglobal.com" />
            <div v-if="addModal.notesErr" class="err-msg">⚠ {{ addModal.notesErr }}</div>
          </div>
          <div v-else>
            <label class="field-label">Notes_ID（Email）<span style="color:#d97706;font-weight:500;font-size:11px;text-transform:none;letter-spacing:0;margin-left:4px;">自動填入</span></label>
            <div class="input-disabled">Otis_Wang@aseglobal.com</div>
          </div>

          <div class="modal-hint">
            📝 確認後將更新後台資料與開啟相應權限
          </div>
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" @click="addModal.step=1">← 上一步</button>
          <button class="btn btn-primary" @click="confirmAdd" :disabled="cfgLoading">
            {{ cfgLoading ? '新增中…' : '確認新增' }}
          </button>
        </div>
      </template>

    </div>
  </div>

  <!-- ══ 移除確認 Modal ══ -->
  <div v-if="modal.show" class="overlay" @click.self="modal.show=false">
    <div class="modal">
      <div class="modal-title">🗑 確認移除</div>
      <div class="modal-body">
        確定要從清單中移除 <strong>「{{ modal.name }}」</strong>？
        <div class="modal-warn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          此操作無法復原。
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" @click="modal.show=false">取消</button>
        <button class="btn btn-danger" @click="doRemove" :disabled="cfgLoading">
          {{ cfgLoading ? '移除中…' : '確認移除' }}
        </button>
      </div>
    </div>
  </div>

</div><!-- app -->

<script src="../static/js/func/Member_manager.js"></script>
</body>
</html>
