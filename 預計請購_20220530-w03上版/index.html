<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登入系統</title>
  <script src="static/js/vue.global.js"></script>
  <link href="static/css/tailwind.min.css" rel="stylesheet" />
  <style>
    #escape-btn {
      position: fixed;
      z-index: 9999;
      transition: left 0.12s cubic-bezier(0.34, 1.56, 0.64, 1),
                  top  0.12s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #tooltip {
      position: fixed;
      background: #1e293b;
      color: #f1f5f9;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 999px;
      pointer-events: none;
      white-space: nowrap;
      z-index: 10000;
      opacity: 0;
      transform: translateY(-4px) translateX(-50%);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }
    #tooltip.show {
      opacity: 1;
      transform: translateY(-12px) translateX(-50%);
    }
  </style>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center overflow-hidden">

  <div id="app" class="w-full max-w-sm bg-white p-8 rounded-xl shadow-md">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">🔐 請登入</h2>

    <div class="space-y-4">
      <input
        v-model="username"
        @keyup.enter="login"
        type="text"
        placeholder="使用者名稱"
        class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
      />
      <input
        v-model="password"
        @keyup.enter="login"
        type="password"
        placeholder="密碼"
        class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
      />

      <!-- 佔位：維持卡片高度不跳動 -->
      <div id="btn-anchor" style="height:40px;"></div>

      <p v-if="error" class="text-red-500 text-sm text-center">{{ error }}</p>
    </div>
  </div>

  <!-- 逃跑按鈕與提示泡泡 -->
  <button id="escape-btn" class="px-6 py-2 rounded font-semibold text-white bg-gray-400 cursor-not-allowed">
    登入
  </button>
  <div id="tooltip"></div>

  <script src="static/js/func/login.js"></script>
</body>
</html>
